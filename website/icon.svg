<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#00cec9"/>
    </linearGradient>
    <linearGradient id="inner" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8e8f0" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Shield shape — credential protection -->
  <path d="M256 96 L384 152 C384 152 392 296 256 408 C120 296 128 152 128 152 Z"
        fill="url(#inner)" opacity="0.15"/>
  <path d="M256 96 L384 152 C384 152 392 296 256 408 C120 296 128 152 128 152 Z"
        stroke="white" stroke-width="12" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Key symbol — credential/identity -->
  <circle cx="232" cy="220" r="36" stroke="white" stroke-width="14" fill="none"/>
  <line x1="260" y1="244" x2="330" y2="314" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="330" y1="314" x2="310" y2="334" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="306" y1="290" x2="286" y2="310" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Agent dot — representing AI agent -->
  <circle cx="232" cy="220" r="12" fill="white"/>
</svg>
